<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilização do crase no Javascript</title>
    <style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ece9e6, #ffffff);
    min-height: 100vh;

    display: flex;
    flex-direction: column; /* AQUI resolve o problema */
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* TÍTULO */
h2 {
    width: 100%;
    max-width: 500px;
    text-align: center;
    margin-bottom: 25px;
    color: #4b2e83;
    font-weight: 600;
    letter-spacing: 1px;
}

/* LABEL */
label {
    width: 100%;
    max-width: 500px;
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: 500;
    color: #555;
}

/* INPUT */
input {
    width: 100%;
    max-width: 500px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
    transition: 0.3s ease;
}

/* INPUT FOCUS */
input:focus {
    border-color: #4b2e83;
    box-shadow: 0 0 0 3px rgba(75, 46, 131, 0.15);
    outline: none;
}

/* BOTÃO */
button {
    width: 100%;
    max-width: 500px;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #4b2e83, #6a4fb3);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

/* BOTÃO HOVER */
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(75, 46, 131, 0.25);
}

/* RESULTADO */
#resultado {
    width: 100%;
    max-width: 500px;
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    background-color: #f5f3fa;
    border-left: 4px solid #4b2e83;
    font-weight: 500;
    color: #333;
    min-height: 40px;
}

</style>
</head>
<body>
    <h2>Exemplo de uso do crase no JavaScript</h2>
    
    <label>Digite seu nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome">

    <label>Digite sua idade</label>
    <input type="number" id="idade" placeholder="Digite sua idade">

    <label>Digite seu Sálario</label>
    <input type="number" id="salario" placeholder="Digite seu salário">

    <button onclick="exibirDados()">Exibir Dados</button>

    <p id="resultado"></p>

    <script>
        function exibirDados() {
            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const salario = document.getElementById('salario').value;

            const resultado = `Olá, ${nome}! Você tem ${idade} anos e seu salário é R$ ${salario}.`;

            document.getElementById('resultado').textContent = resultado;
        }
    </script>
</body>
</html>
